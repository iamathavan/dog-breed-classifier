<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog Breed Classifier</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>🐶 Dog Breed Classifier</h1>
    <p class="subtitle">Upload a dog photo to identify its breed</p>

    <div class="upload-box" id="uploadBox">
      <input type="file" id="fileInput" accept="image/*" hidden>
      <img id="preview" src="" alt="" hidden>
      <div id="placeholder">
        <span>📁</span>
        <p>Click or drag & drop an image here</p>
      </div>
    </div>

    <button id="predictBtn" disabled>Identify Breed</button>

    <div id="loader" hidden>🔍 Analyzing...</div>

    <div id="results" hidden>
      <div class="breed-card">
        <div class="breed-header">
          <span class="trophy">🏆</span>
          <h2 id="breedName"></h2>
        </div>
        <div class="breed-details">
          <div class="detail-row">
            <span class="detail-label">📋 About</span>
            <p id="breedAbout"></p>
          </div>
          <div class="detail-grid">
            <div class="detail-item">
              <span class="detail-label">😊 Temperament</span>
              <span id="breedTemp"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">📅 Lifespan</span>
              <span id="breedLife"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">📏 Size</span>
              <span id="breedSize"></span>
            </div>
          </div>
        </div>
        <a id="breedLink" href="#" target="_blank" class="learn-more">
          Learn More About This Breed →
        </a>
      </div>
    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
